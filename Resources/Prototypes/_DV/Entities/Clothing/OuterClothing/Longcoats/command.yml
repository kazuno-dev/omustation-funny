- type: entity
  parent: [ClothingOuterArmorCaptainCarapace, ClothingOuterWinterCoat, BaseCommandContraband]
  id: ClothingLongcoatCaptainArmored
  name: captain's armored longcoat
  description: A navy blue double-breasted longcoat with gold embelleshments, specifically designed for the captain. It's been reinforced with a special alloy for some added protection.
  components:
  - type: Sprite
    sprite: _Floofstation/Clothing/OuterClothing/Longcoats/captain.rsi
  - type: Clothing
    sprite: _Floofstation/Clothing/OuterClothing/Longcoats/captain.rsi
  - type: Item
    size: Normal
  - type: Armor # Omu arms and trauma deduction
    coverage:
    - Chest
    - Groin
    - Arm
    traumaDeductions:
      Dismemberment: 0.2
      OrganDamage: 0.2
      BoneDamage: 0.2
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.4
        Slash: 0.4
        Piercing: 0.5
        Heat: 0.4
        Caustic: 0.65

