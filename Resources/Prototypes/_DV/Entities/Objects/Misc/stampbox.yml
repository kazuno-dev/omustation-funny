- type: entity
  name: head stamp box
  parent: BoxBase
  id: BoxHeadStampBase
  description: A cardboard box containing all important command member stamps. Other stamps not included.
  components:
  - type: Item
    size: Large
    shape:
    - 0,0,1,1 # Omu, shrink this.
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: RubberStampCaptain
        - id: RubberStampCE
        - id: RubberStampHos
        - id: RubberStampCMO
        - id: RubberStampHop
        #- id: RubberStampChiefJustice # Omu, no CJ
        - id: RubberStampRd
        - id: RubberStampQm
        - id: RubberStampAdminAssistant # Omu, but we have this instead.
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,3,3 # Omu, increase internal size.
    whitelist:
      components:
      - Stamp
  - type: Sprite
    layers:
    - state: box
    - state: stamp
  - type: Tag
    tags:
    - BoxCardboard
