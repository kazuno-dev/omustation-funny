- type: entity
  id: HobbyistSpellBook
  name: hobbyist's spellbook
  description: A book given out by the Wizard Federation to get avid fanatics to finally shut up. Contains fun hobbyist level spells and incantations. The title reads "5 Minute Spells, Magic for Dummies".
  parent: [BaseItem, BaseMagicalContraband]
  components:
  - type: Sprite
    sprite: _Omu/Objects/Weapons/Magic/hobbyistspellbook.rsi
    state: icon
  - type: Item
    sprite: _Omu/Objects/Weapons/Magic/hobbyistspellbook.rsi
    size: Normal
  - type: AmmoCounter
  - type: Gun
    projectileSpeed: 20
    soundEmpty: null
    soundMode: null
    clumsyProof: true
    fireRate: 1
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/Magic/staff_healing.ogg
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: ProjectileBatteryAmmoProvider
    proto: ProjectileSparkHobbyist
    fireCost: 250
  - type: Appearance
  - type: AmmoSelector
    soundSelect:
      path: /Audio/Magic/forcewall.ogg
      params:
        volume: -5
    prototypes:
    - ProjectileSparkHobbyist
    - ProjectileWehBoltHobbyist
    - ProjectileBananaPeelHobbyist
    - ProjectileMagicMissileHobbyist
    - ProjectileHealingHobbyist
  - type: UserInterface
    interfaces:
      enum.AmmoSelectorUiKey.Key:
        type: AmmoSelectorMenuBoundUserInterface
  - type: ActivatableUI
    inHandsOnly: true
    key: enum.AmmoSelectorUiKey.Key
  - type: EmpImmune
  - type: StaticPrice
    price: 10000
  - type: Tag
    tags:
    - GunCanAimShooter
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 1000
    autoRechargePause: true
    autoRechargePauseTime: 5
  - type: EnchantingTool
