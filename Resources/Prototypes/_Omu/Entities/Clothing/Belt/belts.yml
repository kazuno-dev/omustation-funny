- type: entity
  parent: ClothingBeltStorageBase
  id: ClothingBeltChameleonHolster
  name: syndicate shoulder holster
  suffix: Chameleon
  description: A deep shoulder holster capable of holding many types of ballistics.
  components:
  - type: Sprite
    sprite: Clothing/Belt/syndieholster.rsi
  - type: Clothing
    sprite: Clothing/Belt/syndieholster.rsi
  - type: Storage
    grid:
    - 0,0,3,1
  # Goobstation
    whitelist:
      components:
        - BallisticAmmoProvider
        - CartridgeAmmo
      tags:
        - EnergySpeedloader # Goobstation
  - type: ContainerContainer
    containers:
      item: !type:ContainerSlot
      storagebase: !type:Container
        ents: []
  - type: ItemSlots
    slots:
      item:
        name: Gun
        whitelist:
          components:
          - Gun
  - type: ChameleonClothing
    slot: [BELT]
    default: ClothingBeltSyndieHolster
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.ChameleonUiKey.Key:
        type: ChameleonBoundUserInterface
  - type: HideContrabandContent #Goobstation-Contraband detector

- type: entity
  id: ClothingBeltChemBagBSO
  parent: [ BaseStorageItem , ContentsExplosionResistanceBase, BaseCentcommContraband ] # Not parented from ChemBag directly to exclude Dumpable component
  name: blueshield officer's medical pouch
  description: A robust pouch for medical supplies worn by Blueshield Officers especially fond of chemical based medicinals.
  components:
  - type: Sprite
    sprite: _Omu/Clothing/Belt/blueshieldchembag.rsi
    state: icon
  - type: Clothing
    sprite: _Omu/Clothing/Belt/blueshieldchembag.rsi
    quickEquip: false
    slots:
    - belt
  - type: ExplosionResistance
    damageCoefficient: 0.1
  - type: Item
    size: Ginormous
  - type: Storage
    maxItemSize: Normal # allow up to 5 large beakers / 10 beakers / 10 pill canisters
    grid:
    - 0,0,5,3 # Exactly the same as a normal chemag
    quickInsert: true
    areaInsert: true
    whitelist: # Yeah so I kinda just copied everything from the syndie one nukie corpsman gets and then also combined it with the BSO webbing whitelist on request
      tags:
        - PillCanister
        - Syringe
        - Dropper
        - MedicalPatch
        - Brutepack
        - Bloodpack
        - Gauze
        - Ointment
        - CigPack
        - Cigarette
        - Bottle
        - Spray
        - Radio
        - DiscreteHealthAnalyzer
        - SurgeryTool
        - Tourniquet #Goobstation
        - AutoinjectorCartridge # Goobstation
        - HandheldCrewMonitor # Goobstation
        - Medkit # Omustation, for BSO's medical set
        - BodyBag # Omustation, for BSO's surgical set
        - SyringeCase # Copied from CMO's rig
        - RollerBedCompact # For BSO's bluespace roller beds
      components:
        - Pill
        - Hypospray
        - SyringeGun
        - SurgeryTool
        - Defibrillator
        - SolutionTransfer
        - GunApplySolution # Dart gun
        - Flash
        - Handcuff
        - Whistle
        - Injector
        - HandLabeler
        - FitsInDispenser

