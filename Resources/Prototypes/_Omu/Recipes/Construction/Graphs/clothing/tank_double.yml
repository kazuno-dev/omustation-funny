- type: constructionGraph
  id: TankDoubleWeld
  start: start
  graph:
    - node: start
      edges:
      - to: wiredtank
        steps:
        - tag: FullTank
          icon:
            sprite: Objects/Tanks/generic.rsi
            state: icon
          name: construction-graph-tag-dank
        - tag: FullTank
          icon:
            sprite: Objects/Tanks/generic.rsi
            state: icon
          name: construction-graph-tag-dank
        - material: Cable
          amount: 10
          doAfter: 5

    - node: wiredtank
      entity: UnweldedDoubleGasTank
      edges:
      - to: doubletank
        steps:
        - tool: Welding
          doAfter: 10

    - node: doubletank
      entity: DoubleGasTank
      edges:
      - to: start
        steps:
        - tool: Welding
          doAfter: 5
        completed:
        - !type:SpawnPrototype
          prototype: AirTank
        - !type:SpawnPrototype
          prototype: AirTank
        - !type:DeleteEntity
