        Total casualty amount: 1574 People


        Overall an acceptable fatality rate for the amount of information we gathered. Killing the elder changeling we made in the process of testing did unfortunately kill four out of the ten specters we sent after it, however. However, the sacrifice has been more than justified due to the harvested organs providing Central Command the ability to produce changeling panacea, alongside several other highly classified substances not found in regular changelings.


        The biological altering processes changelings use is now well understood and classified as unimportant for further research. As such, a notification has been dispatched to all stations in the know that changelings are no longer a relevant piece of study and are to be exterminated on sight. This should introduce a new hypermutation cycle allowing us to harvest additional data on them to profit off from.


