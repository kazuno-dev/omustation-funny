        [color=#1e7f28]▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬[/color]

        If it weren't for the 5th fleet incident and the ripples caused by its collapse destroying our dedicated blacksite we would not be back to square one, but here we are.


        At least the cosmic cult was nice and “donated” all of this fascinating equipment to us. The veil is a pitiful construct to be honest: their so-called ‘god’ is nothing more than a minor noospheric entity that breaks some laws of physics, nothing that can’t be handled with modern bluespace technology.


        Granted, the cult actually succeeding would destroy the local station. As such this research board advises that we install additional sensors to detect such activity before the noospheric interference grows too great.


        In case of a successful summoning, it is best to wait 4 to 5 days for the local area to cool off before sending in a team to destroy the avatar of the so-called ‘god’. Any converted materials and armaments can then be taken in for study.


        [italic]Centcom Internal Affairs[/italic]


