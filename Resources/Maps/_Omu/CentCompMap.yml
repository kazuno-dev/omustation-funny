        The development of this bioweapon was something truly devilish! The new chimera strain developed for the romerol infection was initially developed by our double agents inside Interdyne and then exported to us. The only issue is that the infection has turned out a bit [italic]too[/italic] efficient; we have lost several specimens during the testing of this new strain as a result of this.


        We have deemed the new version of Romerol unsuited for tactical deployment until further refinement and the installation of a genetic unmutatable killswitch is completed. Until then, the production and distribution of Letoferol is to be halted and stations are instructed to exterminate the current strain on sight.


